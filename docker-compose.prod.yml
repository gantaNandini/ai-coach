version: "3.9"

# ============================================================
# AI Coach Platform — Production Docker Compose
# ============================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (inject via .env or secrets manager):
#   SECRET_KEY, DATABASE_URL (if overriding), STRIPE_SECRET_KEY, etc.
#
# This file DOES NOT include development conveniences:
#   - No volume mounts of local code (image is baked in)
#   - No debug mode
#   - No hot reload
#   - Nginx reverse proxy with TLS termination
# ============================================================

services:

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicoach_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-aicoach}
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only — not exposed to internet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aicoach_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis — job queue + caching ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database migration runner (runs once, then exits) ─────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aicoach_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aicoach}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    command: >
      sh -c "
        echo 'Waiting for postgres...' &&
        python -c \"
import psycopg2, time, sys
for i in range(30):
    try:
        psycopg2.connect(host='postgres', dbname='${POSTGRES_DB:-aicoach}', user='${POSTGRES_USER:-aicoach_prod}', password='${POSTGRES_PASSWORD}', connect_timeout=3)
        print('DB ready'); sys.exit(0)
    except Exception as e:
        print(f'Waiting... ({e})'); time.sleep(2)
print('DB not ready after 60s'); sys.exit(1)
\" &&
        alembic upgrade head &&
        echo 'Migrations complete'
      "
    depends_on:
      postgres:
        condition: service_healthy

  # ── Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aicoach_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aicoach}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:latest}
      ENVIRONMENT: production
      DEBUG: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["https://your-domain.com"]}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://your-domain.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      DATABASE_POOL_SIZE: "20"
      DATABASE_MAX_OVERFLOW: "40"
    volumes:
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --log-level info
        --access-log
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Background worker ─────────────────────────────────────────────────
  # NOTE: Currently uses in-process asyncio worker.
  # Phase 2.2 replaces this with arq or Celery.
  # This service is a placeholder for the worker process separation.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aicoach_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aicoach}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:latest}
      ENVIRONMENT: production
      DEBUG: "false"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # arq worker entrypoint (Phase 2.2) — placeholder uses echo for now
    command: echo "Worker process — replace with 'arq app.tasks.worker_arq.WorkerSettings' in Phase 2.2"

  # ── Ollama (LLM inference) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${APP_BASE_URL:-https://your-domain.com}/api/v1
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx reverse proxy with TLS ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started


volumes:
  postgres_data:
  redis_data:
  ollama_data:
  uploads:
